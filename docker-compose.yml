version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=http://localhost:5000

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  ml-service:
    build:
      context: ./ml-service
      dockerfile: ../docker/ml-service.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./ml-service/.env
    volumes:
      - ./test_directory:/app/test_directory

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ransomwatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
